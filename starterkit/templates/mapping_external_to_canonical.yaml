# mapping_external_to_canonical.yaml — Fifth file (SOP2 §5.5, extended by SOP5).
# External source conventions → GhostCrab facets, schema families, record ids, and default edge labels.
# Supports Obsidian vaults plus CSV/API/JSON/app exports.

workspace_id: "<kebab-case-slug>"

source_contract:
  source_profile: "templates/source_profile.yaml"
  source_kind: "obsidian" # obsidian | csv | json | jsonl | api | directory | database_export | other
  target_model_contract: "<ghostcrab_workspace_export_model-or-local-contract-path>"

record_id_rules:
  - target_schema_id: "<workspace_id>:<entity-type>"
    source_selector: "<folder-pattern-row-filter-or-json-path>"
    record_id_formula: "<entity-type>:{stable-source-id}"
    source_ref_formula: "<source-kind>:<stable-source-id>"
    quarantine_if:
      - "missing stable-source-id"

tag_to_facet_key:
  - obsidian_tag: "décision"
    facet_key: "tags"
    facet_value: "decision"
  - obsidian_tag: "tâche"
    facet_key: "tags"
    facet_value: "task"
  - obsidian_tag_prefix: "status/"
    facet_key: "status"
    extract_suffix: true
  - obsidian_tag_prefix: "priority/"
    facet_key: "priority"
    extract_suffix: true
  - obsidian_tag_prefix: "phase/"
    facet_key: "project_phase"
    extract_suffix: true

frontmatter_to_facet:
  - fm_key: "client"
    facet_key: "client_id"
  - fm_key: "assignee"
    facet_key: "owner"
  - fm_key: "title"
    facet_key: "title"
  - fm_key: "date"
    facet_key: "date"
  - fm_key: "status"
    facet_key: "status"

folder_to_schema_family:
  - folder_pattern: "decisions/**"
    schema_family: "<workspace_id>:design-decisions"
  - folder_pattern: "clients/**"
    schema_family: "<workspace_id>:client-knowledge"
  - folder_pattern: "tasks/**"
    schema_family: "<workspace_id>:project-plan"
  - folder_pattern: "content/**"
    schema_family: "<workspace_id>:site-content"
  - folder_pattern: "history/**"
    schema_family: "<workspace_id>:project-history"

wikilink_to_edge_label:
  - source_schema_family: "<workspace_id>:design-decisions"
    target_schema_family: "<workspace_id>:client-knowledge"
    default_label: "OWNED_BY"
  - source_schema_family: "<workspace_id>:project-plan"
    target_schema_family: "<workspace_id>:design-decisions"
    default_label: "DEPENDS_ON"
  - default_label: "REFERENCES"

field_to_facet:
  # Generic CSV/API/JSON mapping rules. Keep Obsidian frontmatter rules above for vault imports.
  - source_selector: "<row-filter-or-json-path>"
    target_schema_id: "<workspace_id>:<entity-type>"
    source_field: "<column-or-json-path>"
    facet_key: "<target-facet>"
    transform: "identity" # identity | trim | lowercase | slug | date_iso | enum_map | record_id_ref | custom
    required: false
    default: null
    enum_map: null

relation_extraction:
  - source_selector: "<row-filter-or-json-path>"
    edge_label: "<UPPER_SNAKE_CASE-or-domain-label>"
    source_record_id_formula: "<entity-type>:{source-id}"
    target_record_id_formula: "<entity-type>:{target-id}"
    confidence: 1.0
    quarantine_if:
      - "source missing"
      - "target missing"

enum_maps:
  "<enum-name>":
    "<source-value>": "<target-value>"

pending_review_rules:
  - code: "missing_required_facet"
    when: "<condition>"
    action: "pending_review"
  - code: "needs_model_extension"
    when: "<condition>"
    action: "pending_ddl"
