# import_manifest.yaml — Final audit record for one source import run (SOP5).

edition: "personal-mcp"
workspace_id: "<kebab-case-slug>"
run_id: "<YYYYMMDD-HHMMSS-source-slug>"
status: "draft" # draft | dry_run_passed | imported | consumer_validated | failed

import_path_choices:
  ontology_path: "<linkml|mcp_incremental>"
  tabular_path: "<structured_import_cli|sop5_compiler>"
  # Project-local choices file (not starter-kit template path)
  choices_file: "<workspace-slug>/import_path_choices.yaml"
  confirmed_at: "<ISO-8601>"

runtime:
  ghostcrab_runtime: "<perso-or-pro-product-runtime>"
  backend: "<postgresql-or-sqlite-or-other>"
  database_identity: "<dsn-or-sqlite-path-or-redacted>"
  # Optional: clone root (parent of starterkit/) — else GCP_STARTERKIT_ROOT env or paths.starterkit_root in choices YAML
  starterkit_root: null
  verified_at: "<ISO-8601>"

inputs:
  source_profile: "templates/source_profile.yaml"
  target_model_contract: "<exported-model-or-local-contract-path>"
  mapping_contract: "templates/mapping_external_to_canonical.yaml"
  disambiguation: "templates/disambiguation.yaml"
  consumer_contract: "templates/consumer_contract.yaml"

outputs:
  normalized_records: "output/normalized_records.jsonl"
  normalized_edges: "output/normalized_edges.jsonl"
  pending_review: "output/pending_review.json"
  pending_ddl: "output/pending_ddl.json"
  syncstate: "output/syncstate.json"

counts:
  source_records: null
  normalized_records: null
  normalized_edges: null
  pending_review: null
  pending_ddl: null
  imported_facets: null
  graph_nodes: null
  graph_edges: null

commands:
  # sop5_compiler: starterkit/scripts/* dry-run steps
  # structured_import_cli: gcp brain structured-import validate|register-semantics|apply|reindex
  - step: "<step-name>"
    path: "<sop5_compiler|structured_import_cli>"
    command: "<command-or-mcp-call-summary>"
    exit_status: null
    report_path: "<optional-report-path>"

exceptions:
  blocking: []
  reviewed: []
  deferred: []

consumer_results:
  - consumer: "<consumer-name>"
    status: "not_run" # not_run | passed | failed | skipped
    report_path: "<optional-report-path>"

notes: ""
