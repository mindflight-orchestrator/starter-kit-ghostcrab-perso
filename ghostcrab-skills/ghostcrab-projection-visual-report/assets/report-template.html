<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{title}}</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #17202a;
        --muted: #607080;
        --line: #d9e1e8;
        --panel: #ffffff;
        --page: #f5f7fa;
        --green: #138a52;
        --yellow: #b7791f;
        --orange: #c05621;
        --red: #c53030;
        --blue: #2457a6;
      }
      body {
        margin: 0;
        background: var(--page);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.45;
      }
      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 32px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 30px;
        letter-spacing: 0;
      }
      h2 {
        margin: 32px 0 12px;
        font-size: 18px;
      }
      .summary {
        color: var(--muted);
        max-width: 840px;
        margin: 0 0 24px;
      }
      .kpis {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        gap: 12px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }
      .label {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .value {
        margin-top: 8px;
        font-size: 28px;
        font-weight: 700;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 22px;
        padding: 0 8px;
        border-radius: 999px;
        color: #fff;
        font-size: 12px;
        font-weight: 650;
      }
      .green { background: var(--green); }
      .yellow { background: var(--yellow); }
      .orange { background: var(--orange); }
      .red { background: var(--red); }
      .blue { background: var(--blue); }
      .timeline {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
      }
      th, td {
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }
      th {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        background: #f9fbfd;
      }
      tr:last-child td {
        border-bottom: 0;
      }
      .actions {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 12px;
      }
      code {
        background: #eaf0f6;
        padding: 2px 5px;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <main>
      {{body}}
    </main>
  </body>
</html>
